version: '3.8'

services:
  trading-llm:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-llm:latest
    container_name: trading-llm-dev
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - USE_SAMPLE_DATA=true  # Use offline sample data by default
    
    # Volume mounts for persistence
    volumes:
      # Persist data between runs
      - ./data:/app/data
      # Persist trained models
      - ./models:/app/models
      # Mount source code for development (optional - comment out for production)
      - ./src:/app/src
      - ./utils:/app/utils
    
    # Working directory
    working_dir: /app
    
    # Keep container running for interactive use
    stdin_open: true
    tty: true
    
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Command to run (can override with docker-compose run)
    command: /bin/bash

  # GPU-enabled version (requires nvidia-docker)
  trading-llm-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-llm:latest
    container_name: trading-llm-gpu
    
    environment:
      - PYTHONUNBUFFERED=1
      - USE_SAMPLE_DATA=true
      - CUDA_VISIBLE_DEVICES=0  # Use first GPU
    
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./utils:/app/utils
    
    working_dir: /app
    stdin_open: true
    tty: true
    
    # Enable GPU access
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    command: /bin/bash
    profiles:
      - gpu  # Only start with --profile gpu

  # Jupyter notebook server (optional)
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-llm:latest
    container_name: trading-llm-jupyter
    
    environment:
      - PYTHONUNBUFFERED=1
      - USE_SAMPLE_DATA=true
    
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./utils:/app/utils
      - ./notebooks:/app/notebooks  # Mount notebooks directory
    
    ports:
      - "8888:8888"
    
    working_dir: /app
    
    command: >
      bash -c "pip install jupyter notebook &&
               jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
               --NotebookApp.token='' --NotebookApp.password=''"
    
    profiles:
      - jupyter  # Only start with --profile jupyter
